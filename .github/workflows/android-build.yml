name: Android Build

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 12266719
          accept-android-sdk-licenses: true

      - name: Install NDK & CMAKE
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install 'ndk;25.1.8937393' 'cmake;3.22.1'
          echo "NDK_DIR=$ANDROID_HOME/ndk/25.1.8937393" >> $GITHUB_ENV

      - name: Build APK
        run: |
          ./gradlew assembleRelease
          echo "## Cloud Build Engine — Build Summary" >> $GITHUB_STEP_SUMMARY

      - name: Upload APK        
        uses: actions/upload-artifact@v4
        with:
          name: CamSwapOS-FaceFilter
          path: app/build/outputs/apk/*/*.apk